# Automatically generate TODO Issues from source code comments
name: Generate TODO Tickets

on:
  push:
    branches:
    - master

# tdg-github-action opens TODO issues via the GITHUB_TOKEN
permissions:
  contents: read
  issues: write

jobs:
  todo:

    runs-on: ubuntu-latest

    steps:
      - name: Echo Trigger
        id: echo-trigger
        run: echo "Job triggered by ${{ github.event_name }}"

      - name: Echo Runner OS
        id: echo-runner-os
        run: echo "Job running on ${{ runner.os }} server"

      - name: Echo Git Ref
        id: echo-git-ref
        run: echo "Using ${{ github.ref }} branch from ${{ github.repository }} repository"

      # https://github.com/actions/checkout
      - name: Checkout Repository
        id: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # https://github.com/ribtoks/tdg-github-action
      - name: Generate TODO Tickets
        id: todo
        uses: ribtoks/tdg-github-action@7cc4b6643e790dde39ac8bf2cfc8c08c660afbb2 # v0.4.17-beta
        with:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          LABEL: "TODO"
          ROOT: "src"
          # This is scoped to /src to prevent accidental discovery of comments in node_modules, git hooks, etc.

      - name: Echo Status
        id: echo-status
        run: echo "Job status is ${{ job.status }}."

