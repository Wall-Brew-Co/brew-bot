# Synchronize labels on the repository with the labels defined in .github/labels.yml
name: Sync labels

on:
  push:
    branches:
      - master
    paths:
      - .github/labels.yml

# action-label-syncer manages repository labels via the GITHUB_TOKEN
permissions:
  contents: read
  issues: write

jobs:
  label-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Echo Trigger
        id: echo-trigger
        run: echo "Job triggered by ${{ github.event_name }}"

      - name: Echo Runner OS
        id: echo-runner-os
        run: echo "Job running on ${{ runner.os }} server"

      - name: Echo Git Ref
        id: echo-git-ref
        run: echo "Using ${{ github.ref }} branch from ${{ github.repository }} repository"

      # https://github.com/actions/checkout
      - name: Checkout Repository
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # https://github.com/micnncim/action-label-syncer
      - name: Synchronize Labels
        id: sync-labels
        uses: micnncim/action-label-syncer@3abd5ab72fda571e69fffd97bd4e0033dd5f495c # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          manifest: .github/labels.yml

      - name: Echo Status
        id: echo-status
        run: echo "Job status is ${{ job.status }}."

