# Verifies that the project is compatible with cljdoc, and that our documentation will render correctly.
name: Check cljdoc compatibility

on: ["pull_request", "workflow_dispatch"]

permissions:
  contents: read

jobs:
  check-cljdoc:

    # Cancel any runs in progress for the same workflow and PR
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    runs-on: ubuntu-latest
    steps:
      - name: Echo Trigger
        id: echo-trigger
        run: echo "Job triggered by ${{ github.event_name }}"

      - name: Echo Runner OS
        id: echo-runner-os
        run: echo "Job running on ${{ runner.os }} server"

      - name: Echo Git Ref
        id: echo-git-ref
        run: echo "Using ${{ github.ref }} branch from ${{ github.repository }} repository"

      # https://github.com/actions/checkout
      - name: Checkout Repository
        id: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # https://github.com/actions/setup-java
      - name: Setup Java
        id: install-java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
          # This should match system.properties

      # https://github.com/DeLaGuardo/setup-clojure
      - name: Install Leiningen
        id: install-leiningen
        uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          # renovate: datasource=github-releases depName=technomancy/leiningen
          lein: '2.13.0'
          # renovate: datasource=github-releases depName=clj-kondo/clj-kondo versioning=loose
          clj-kondo: '2026.05.25'
          # renovate: datasource=github-releases depName=greglook/cljstyle
          cljstyle: '0.17.642'

      # https://github.com/actions/cache
      - name: Cache Maven Dependencies
        id: cache-maven
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        env:
          cache-name: cache-maven
        with:
          path: ~/.m2
          key: ${{ runner.os }}-clj-${{ hashFiles('**/project.clj') }}
          restore-keys: |
            ${{ runner.os }}-clj

      - name: Install Clojure Dependencies
        id: install-deps
        run: lein deps

      - name: Echo Leiningen Version
        id: lein-version
        run: lein -v

      - name: Package The Library As A Jar
        id: package
        run: lein jar

      # https://github.com/cljdoc/cljdoc-check-action
      - name: cljdoc Check
        id: cljdoc-check
        uses: cljdoc/cljdoc-check-action@e2317d0a99ff9bcfbdde9e734edac1ff62bdc9e6 # v0.0.3

      - name: Echo Status
        id: echo-status
        run: echo "Job status is ${{ job.status }}."

