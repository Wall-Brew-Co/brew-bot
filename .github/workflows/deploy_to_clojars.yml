# Deploy the cuurent project to Clojars
# All deployments use the Wall Brew Bot user
name: Deploy to Clojars

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    # This job requires the Wall Brew Bot Token, so it is only run on non-forked repositories
    if: github.repository_owner == 'Wall-Brew-Co'

    runs-on: ubuntu-latest

    steps:
      - name: Echo Trigger
        id: echo-trigger
        run: echo "Job triggered by ${{ github.event_name }}"

      - name: Echo Runner OS
        id: echo-runner-os
        run: echo "Job running on ${{ runner.os }} server"

      - name: Echo Git Ref
        id: echo-git-ref
        run: echo "Using ${{ github.ref }} branch from ${{ github.repository }} repository"

      # https://github.com/actions/checkout
      - name: Checkout Repository
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # https://github.com/actions/setup-java
      - name: Setup Java
        id: install-java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '21'
          # This should match system.properties

      # https://github.com/DeLaGuardo/setup-clojure
      - name: Install Leiningen
        id: install-leiningen
        uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          # renovate: datasource=github-releases depName=technomancy/leiningen
          lein: '2.12.0'
          # renovate: datasource=github-releases depName=clj-kondo/clj-kondo versioning=loose
          clj-kondo: '2026.05.25'
          # renovate: datasource=github-releases depName=greglook/cljstyle
          cljstyle: '0.17.642'

      # https://github.com/actions/cache
      - name: Cache Maven Dependencies
        id: cache-maven
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        env:
          cache-name: cache-maven
        with:
          path: ~/.m2
          key: ${{ runner.os }}-clj-${{ hashFiles('**/project.clj') }}
          restore-keys: |
            ${{ runner.os }}-clj

      - name: Install Clojure Dependencies
        id: install-deps
        run: lein deps

      - name: Echo Leiningen Version
        id: lein-version
        run: lein -v

      # This isn't strictly required to deploy, but is a quality check against our documentation
      - name: Validate Changelog Status
        id: validate-changelog
        run: lein sealog check

      # This helps us ensure that we are deploying the correct version
      - name: Display Version
        id: display-version
        run: lein sealog version

      # This is a sanity check to ensure that the project is in a good state
      - name: Run Sanity Tests
        id: sanity-test
        run: lein test

      # Compile the project into a jar file
      # This is the file that will be deployed to Clojars and is the final gate before deployment
      - name: Run Build Test
        id: build-test
        run: lein jar

      - name: Publish To Clojars
        id: publish
        env:
          CLOJARS_USER: ${{ secrets.CLOJARS_USER }}
          CLOJARS_PASS: ${{ secrets.CLOJARS_PASS }}
        run: lein deploy clojars

      - name: Resolve version
        id: versionchk
        run: echo "VERSION=$(lein sealog version project.clj | tail -n 1)" >> $GITHUB_OUTPUT

      # Push a tag to the repository to mark the version
      # This also helps Renovate locate Change Notes for dependency update PRs
      # https://github.com/hole19/git-tag-action
      - name: Push Tag
        id: push-tag
        uses: hole19/git-tag-action@0b717b660aa3ac0154c5c5e02d6153642cc64966 # v1.0
        env:
          TAG: v${{ steps.versionchk.outputs.VERSION }}
          GITHUB_TOKEN: ${{ secrets.WALL_BREW_BOT_PAT }}

      - name: Echo Status
        id: echo-status
        run: echo "Job status is ${{ job.status }}."

