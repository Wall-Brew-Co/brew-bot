# Jobs to lint the repository for various issues
# For more information, please visit: https://github.com/Wall-Brew-Co/open-source/blob/master/README.md#automating-opinions
name: Linter

on: ["workflow_dispatch", "pull_request"]

permissions:
  contents: read

jobs:
  spell-check:
    # This job requires the Wall Brew Bot Token, so it is only run on non-forked repositories
    if: github.repository_owner == 'Wall-Brew-Co'

    # reviewdog posts review comments back to the pull request
    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
      - name: Echo Trigger
        id: echo-trigger
        run: echo "Job triggered by ${{ github.event_name }}"

      - name: Echo Runner OS
        id: echo-runner-os
        run: echo "Job running on ${{ runner.os }} server"

      - name: Echo Git Ref
        id: echo-git-ref
        run: echo "Using ${{ github.ref }} branch from ${{ github.repository }} repository"

      # https://github.com/actions/checkout
      - name: Checkout Repository
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      # https://github.com/reviewdog/action-misspell
      - name: Check Spelling
        id: spell-check
        uses: reviewdog/action-misspell@d6429416b12b09b4e2768307d53bef58d172e962 # v1
        with:
          github_token: ${{ secrets.WALL_BREW_BOT_PAT }}
          locale: "US"
          reporter: github-pr-review
          level: error
          filter_mode: file
          ignore: "litre,millilitre,litres,millilitres"
          # Brewing applications support both US and non-US English

      - name: Echo Status
        id: echo-status
        run: echo "Job status is ${{ job.status }}."

  clj-kondo:
    # This job requires the Wall Brew Bot Token, so it is only run on non-forked repositories
    if: github.repository_owner == 'Wall-Brew-Co'

    # reviewdog posts review comments back to the pull request
    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
      - name: Echo Trigger
        id: echo-trigger
        run: echo "Job triggered by ${{ github.event_name }}"

      - name: Echo Runner OS
        id: echo-runner-os
        run: echo "Job running on ${{ runner.os }} server"

      - name: Echo Git Ref
        id: echo-git-ref
        run: echo "Using ${{ github.ref }} branch from ${{ github.repository }} repository"

      # https://github.com/actions/checkout
      - name: Checkout Repository
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      # https://github.com/nnichols/clojure-lint-action
      - name: Lint Clojure
        id: clj-kondo
        uses: nnichols/clojure-lint-action@0cf2245e83a1b3c74ebe487ef18d96a483fc5f36 # v11
        with:
          github_token: ${{ secrets.WALL_BREW_BOT_PAT }}
          reporter: github-pr-review
          level: error
          filter_mode: file

      - name: Echo Status
        id: echo-status
        run: echo "Job status is ${{ job.status }}."

  # https://github.com/Wall-Brew-Co/lein-sealog
  sealog:
    runs-on: ubuntu-latest

    steps:
      - name: Echo Trigger
        id: echo-trigger
        run: echo "Job triggered by ${{ github.event_name }}"

      - name: Echo Runner OS
        id: echo-runner-os
        run: echo "Job running on ${{ runner.os }} server"

      - name: Echo Git Ref
        id: echo-git-ref
        run: echo "Using ${{ github.ref }} branch from ${{ github.repository }} repository"

      # https://github.com/actions/checkout
      - name: Checkout Repository
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      # https://github.com/actions/setup-java
      - name: Setup Java
        id: install-java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '21'
          # This should match system.properties

      # https://github.com/DeLaGuardo/setup-clojure
      - name: Install Leiningen
        id: install-leiningen
        uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          # renovate: datasource=github-releases depName=technomancy/leiningen
          lein: '2.12.0'
          # renovate: datasource=github-releases depName=clj-kondo/clj-kondo versioning=loose
          clj-kondo: '2026.05.25'
          # renovate: datasource=github-releases depName=greglook/cljstyle
          cljstyle: '0.17.642'

      # https://github.com/actions/cache
      - name: Cache Maven Dependencies
        id: cache-maven
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        env:
          cache-name: cache-maven
        with:
          path: ~/.m2
          key: ${{ runner.os }}-clj-${{ hashFiles('**/project.clj') }}
          restore-keys: |
            ${{ runner.os }}-clj

      - name: Install Clojure Dependencies
        id: install-deps
        run: lein deps

      - name: Echo Leiningen Version
        id: lein-version
        run: lein -v

      - name: Validate Sealog Entries
        id: validate-changelog
        run: lein sealog check

      - name: Echo Status
        id: echo-status
        run: echo "Job status is ${{ job.status }}."

  # https://github.com/Wall-Brew-Co/bouncer
  bouncer:
    runs-on: ubuntu-latest

    steps:
      - name: Echo Trigger
        id: echo-trigger
        run: echo "Job triggered by ${{ github.event_name }}"

      - name: Echo Runner OS
        id: echo-runner-os
        run: echo "Job running on ${{ runner.os }} server"

      - name: Echo Git Ref
        id: echo-git-ref
        run: echo "Using ${{ github.ref }} branch from ${{ github.repository }} repository"

      # https://github.com/actions/checkout
      - name: Checkout Repository
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      # https://github.com/actions/setup-java
      - name: Setup Java
        id: install-java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '21'
          # This should match system.properties

      # https://github.com/DeLaGuardo/setup-clojure
      - name: Install Leiningen
        id: install-leiningen
        uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          # renovate: datasource=github-releases depName=technomancy/leiningen
          lein: '2.12.0'
          # renovate: datasource=github-releases depName=clj-kondo/clj-kondo versioning=loose
          clj-kondo: '2026.05.25'
          # renovate: datasource=github-releases depName=greglook/cljstyle
          cljstyle: '0.17.642'

      # https://github.com/actions/cache
      - name: Cache Maven Dependencies
        id: cache-maven
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        env:
          cache-name: cache-maven
        with:
          path: ~/.m2
          key: ${{ runner.os }}-clj-${{ hashFiles('**/project.clj') }}
          restore-keys: |
            ${{ runner.os }}-clj

      - name: Install Clojure Dependencies
        id: install-deps
        run: lein deps

      - name: Echo Leiningen Version
        id: lein-version
        run: lein -v

      - name: Validate Bouncer Rules
        id: validate-bouncer
        run: lein bouncer check

      - name: Echo Status
        id: echo-status
        run: echo "Job status is ${{ job.status }}."

